<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Blackboard</title>
    <script src="tailwind.js"></script>
    <link rel="stylesheet" href="styles.css">
    <base target="_blank">
<base target="_blank">
</head>
<body class="text-gray-200 select-none">

    <!-- 视频背景元素 - 最底层 (z-index: 1) -->
    <video id="video-background" autoplay playsinline muted></video>

    <!-- Canvas Container - 中间层 (z-index: 10) -->
    <div id="canvas-container" class="cursor-pen w-full h-full fixed inset-0"></div>

    <!-- 超大橡皮擦预览层 - z-index: 20 -->
    <canvas id="mega-eraser-preview"></canvas>

    <!-- Grid Canvas - 在画布之上但在UI之下 -->
    <canvas id="grid-canvas"></canvas>

    <!-- 左下角隐藏按钮（合并自原C#中的btnHide） -->
    <button id="btn-hide" onclick="hideWebLayer()"
            style="position: fixed; bottom: 42px; left: -20px; z-index: 1000; width: 80px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 30px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); border: 2px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.9); cursor: pointer;">
           <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>隐藏
    </button>

    <!-- Bottom Right: Clean Page Navigation -->
    <div class="fixed bottom-3 right-3 z-50 flex items-center gap-1">
        <button id="prevPageBtn" class="nav-btn" ontouchstart="handlePrevPageTouch(event)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 18l-6-6 6-6" />
            </svg>
        </button>

        <div class="text-sm text-white/50 w-12 text-center select-none" id="pageIndicator">1/1</div>

        <button id="nextPageBtn" class="nav-btn" ontouchstart="handleNextPageTouch(event)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18l6-6-6-6" />
            </svg>
        </button>
    </div>

    <!-- Bottom Center: Toolbar -->
    <div class="toolbar">
        <div style="position: relative;">
            <button id="tool-pen" class="tool-btn" onclick="handlePenClick()" ontouchstart="handlePenTouch(event)">
                <img id="img-pen" src="icon/笔-松开.png" alt="笔">
            </button>
            <div id="penMenu" class="pen-menu">
                <div class="pen-menu-header">画笔设置</div>

                <div class="color-section">
                    <span class="section-label">颜色</span>
                    <div class="color-palette" id="colorPalette"></div>
                </div>

                <div class="size-section">
                    <span class="section-label">粗细</span>
                    <div class="size-presets">
                        <button class="size-preset-btn" onclick="setPenSize(1)" ontouchstart="handleTouchStartBtn(event)" ontouchmove="handleTouchMoveBtn(event)" ontouchend="handleTouchEndBtn(event)">
                            <div class="size-preset-dot" style="width: 4px; height: 4px;"></div>
                        </button>
                        <button class="size-preset-btn active" onclick="setPenSize(2.5)" ontouchstart="handleTouchStartBtn(event)" ontouchmove="handleTouchMoveBtn(event)" ontouchend="handleTouchEndBtn(event)">
                            <div class="size-preset-dot" style="width: 8px; height: 8px;"></div>
                        </button>
                        <button class="size-preset-btn" onclick="setPenSize(5)" ontouchstart="handleTouchStartBtn(event)" ontouchmove="handleTouchMoveBtn(event)" ontouchend="handleTouchEndBtn(event)">
                            <div class="size-preset-dot" style="width: 12px; height: 12px;"></div>
                        </button>
                        <button class="size-preset-btn" onclick="setPenSize(10)" ontouchstart="handleTouchStartBtn(event)" ontouchmove="handleTouchMoveBtn(event)" ontouchend="handleTouchEndBtn(event)">
                            <div class="size-preset-dot" style="width: 16px; height: 16px;"></div>
                        </button>
                    </div>
                </div>

                <!-- 自动校正开关 -->
                <div class="grid-section">
                    <div class="grid-toggle" onclick="toggleAutoCorrection()" ontouchstart="handleTouchStartBtn(event)" ontouchmove="handleTouchMoveBtn(event)" ontouchend="handleTouchEndBtn(event)">
                        <span class="grid-toggle-label">自动校正</span>
                        <div class="grid-toggle-switch" id="autoCorrectionSwitch"></div>
                    </div>
                </div>

            </div>
        </div>

        <button id="tool-eraser" class="tool-btn" onclick="setTool('eraser')" ontouchstart="handleEraserTouch(event)">
            <img id="img-eraser" src="icon/橡皮-松开.png" alt="橡皮">
        </button>

        <button id="btn-undo" class="tool-btn" onclick="undo()" ontouchstart="handleUndoTouch(event)">
            <img id="img-undo" src="icon/撤回-松开.png" alt="撤回">
        </button>

        <button id="btn-clear" class="tool-btn" onclick="confirmClear()" ontouchstart="handleClearTouch(event)">
            <img id="img-clear" src="icon/清除-松开.png" alt="清除">
        </button>

        <div style="position: relative;">
            <button id="btn-more" class="tool-btn" onclick="handleMoreClick(event)" ontouchstart="handleMoreTouch(event)">
                <img id="img-more" src="icon/更多-松开.png" alt="更多">
            </button>
            <div id="moreMenu" class="more-menu" onclick="event.stopPropagation()">
                <div class="more-menu-header">更多功能</div>
                <div class="more-menu-grid">
                    <button class="more-menu-btn" onclick="startShapeDraw('circle')" ontouchstart="handleTouchStartBtn(event)" ontouchmove="handleTouchMoveBtn(event)" ontouchend="handleTouchEndBtn(event)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="9" />
                        </svg>
                        <span>圆形</span>
                    </button>
                    <button class="more-menu-btn" onclick="startShapeDraw('line')" ontouchstart="handleTouchStartBtn(event)" ontouchmove="handleTouchMoveBtn(event)" ontouchend="handleTouchEndBtn(event)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="19" x2="19" y2="5" />
                        </svg>
                        <span>直线</span>
                    </button>
                    <button class="more-menu-btn" onclick="startShapeDraw('dashed')" ontouchstart="handleTouchStartBtn(event)" ontouchmove="handleTouchMoveBtn(event)" ontouchend="handleTouchEndBtn(event)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="3 3">
                            <line x1="5" y1="19" x2="19" y2="5" />
                        </svg>
                        <span>虚线</span>
                    </button>
                    <button class="more-menu-btn" onclick="toggleTransparentMode()" ontouchstart="handleTouchStartBtn(event)" ontouchmove="handleTouchMoveBtn(event)" ontouchend="handleTouchEndBtn(event)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                        <span id="transparentModeText">透明模式</span>
                    </button>
                    <button class="more-menu-btn" onclick="showVideoMenuFromMore()" ontouchstart="handleTouchStartBtn(event)" ontouchmove="handleTouchMoveBtn(event)" ontouchend="handleTouchEndBtn(event)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="23 7 16 12 23 17 23 7"></polygon>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                        </svg>
                        <span>视频背景</span>
                    </button>
                    <button class="more-menu-btn" onclick="showAbout()" ontouchstart="handleTouchStartBtn(event)" ontouchmove="handleTouchMoveBtn(event)" ontouchend="handleTouchEndBtn(event)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 16v-4" />
                            <path d="M12 8h.01" />
                        </svg>
                        <span>关于</span>
                    </button>
                </div>
            </div>
            <!-- 视频背景菜单（从更多菜单打开） -->
            <div id="videoMenu" class="video-menu" onclick="event.stopPropagation()">
                <div class="video-menu-header">视频背景设置</div>
                <div class="video-toggle" onclick="toggleVideoBackground()" ontouchstart="handleTouchStartBtn(event)" ontouchmove="handleTouchMoveBtn(event)" ontouchend="handleTouchEndBtn(event)">
                    <span class="video-toggle-label">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="23 7 16 12 23 17 23 7"></polygon>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                        </svg>
                        展台模式
                    </span>
                    <div class="video-toggle-switch" id="videoToggleSwitch"></div>
                </div>
                <div class="video-status" id="videoStatus">摄像头已关闭</div>
            </div>
        </div>

        <button id="btn-lottery" class="tool-btn" onclick="showLottery()" ontouchstart="handleLotteryTouch(event)"">
            <img id="img-lottery" src="icon/抽学号-松开.png" alt="抽学号">
        </button>
    </div>

    <div id="clearConfirmBar" class="confirm-bar">
        <div class="confirm-modal">
            <div class="confirm-modal-top-bar"></div>
            <div class="confirm-modal-content">
                <div class="confirm-bar-text">确认清空当前页面？清空后无法撤回。</div>
                <div class="confirm-bar-buttons">
                    <button onclick="executeClear()" class="confirm-btn confirm-btn-confirm">清空</button>
                    <button onclick="closeClearModal()" class="confirm-btn confirm-btn-cancel">取消</button>
                </div>
            </div>
        </div>
    </div>

    <div id="perfWarningBar" class="confirm-bar">
        <div class="confirm-modal">
            <div class="confirm-modal-top-bar"></div>
            <div class="confirm-modal-content">
                <div class="confirm-bar-text">设备性能不足时过多页数可能导致未知BUG</div>
                <div class="confirm-bar-buttons">
                    <button onclick="confirmAddPage()" class="confirm-btn confirm-btn-confirm">继续加页</button>
                    <button onclick="closePerfModal()" class="confirm-btn confirm-btn-cancel">取消操作</button>
                </div>
            </div>
        </div>
    </div>

    <div id="resetAllConfirmBar" class="confirm-bar">
        <div class="confirm-modal">
            <div class="confirm-modal-top-bar"></div>
            <div class="confirm-modal-content">
                <div class="confirm-bar-text">确认重置黑板？所有页面内容将被清空且无法恢复。</div>
                <div class="confirm-bar-buttons">
                    <button onclick="executeResetAll()" class="confirm-btn confirm-btn-confirm">确认重置</button>
                    <button onclick="closeResetAllModal()" class="confirm-btn confirm-btn-cancel">取消</button>
                </div>
            </div>
        </div>
    </div>

    <div class="number-result" id="numberResult">
        <div class="result-close-layer" id="resultCloseLayer"></div>
        <div class="result-number" id="resultNumber"></div>

    </div>

    <!-- 关于对话框 - 新样式 -->
    <div id="aboutDialog" class="about-dialog" onclick="closeAboutOnOverlay(event)">
        <div class="confirm-modal">
            <div class="confirm-modal-top-bar"></div>
            <div class="confirm-modal-content">
                <img src="icon/ba.png" alt="Logo" class="about-image">
                <div class="confirm-bar-text">
                    <a href="https://bluearchive-cn.com/" target="_blank">欢 迎 来 到   基 沃 托 斯  !</a>   W  E  L  C  O  M  E   T  O   K  I  V  O  T  O  S<br>Interactive Blackboard 26w17a _ 此项目已在GitHub上开源：<a href="https://github.com/yzh1hdy/Floating-blackboard" target="_blank">https://github.com/yzh1hdy/Floating-blackboard</a>
                </div>
                <div class="confirm-bar-buttons">
                    <button onclick="closeAbout()" class="confirm-btn confirm-btn-cancel">确定</button>
                    <button onclick="confirmResetAll()" class="confirm-btn confirm-btn-confirm">重置黑板</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 关于视频弹窗 -->
    <div id="aboutVideoOverlay" class="video-overlay" onclick="closeAboutVideo(event)">
        <div class="video-modal" onclick="event.stopPropagation()">
            <button id="aboutVideoCloseBtn" class="video-close-btn" onclick="closeAboutVideo(event)">×</button>
            <video id="aboutVideo" src="ba.mp4" controls preload="metadata"></video>
        </div>
    </div>

    <script src="app-data.js"></script>
    <script src="app-draw.js"></script>
    <script src="app-core.js"></script>

    <!-- 隐藏功能脚本 -->
    <script>
        // 隐藏白板功能：通过WebView2的postMessage通知C#层
        function hideWebLayer() {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage("hideWebLayer");
            } else {
                console.log("Hide command sent (webview not available)");
            }
        }

        // 键盘快捷键支持：按ESC键也可以隐藏
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                hideWebLayer();
            }
        });

        // 添加按钮悬停效果
        (function() {
            var btn = document.getElementById('btn-hide');
            if (btn) {
                btn.addEventListener('mouseenter', function() {
                    this.style.background = 'rgba(255,255,255,0.25)';
                    this.style.color = '#fff';
                });
                btn.addEventListener('mouseleave', function() {
                    this.style.background = 'rgba(255,255,255,0.15)';
                    this.style.color = 'rgba(255,255,255,0.9)';
                });
            }
        })();
    </script>

    <div class="fixed bottom-3 left-4 text-white/50 text-sm z-50">   26w17a-测试版</div>

</body>
</html>
